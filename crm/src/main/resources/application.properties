spring.application.name=crm

# ── Base de datos ──────────────────────────────────────────────────────────────
# Para desarrollo local usa Docker: docker compose up -d mysql
# El docker-compose expone MySQL en el puerto 3307 del host (interno 3306).
# En producción (Docker) estas props son sobreescritas por las env vars del contenedor.
spring.datasource.url=jdbc:mysql://localhost:3307/${MYSQL_DATABASE:campusland_crm}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:crm_user}
spring.datasource.password=${MYSQL_PASSWORD:crm_pass}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true

security.jwt.secret=campusland-crm-super-secret-key-2024-production-ready-minimum-256bits
security.jwt.issuer=campusland-crm
security.jwt.ttl-minutes=120

integrations.email.base-url=http://localhost:8081
integrations.email.api-key=dev-email-api-key
integrations.hunter.base-url=http://localhost:8082
integrations.hunter.api-key=dev-hunter-api-key
integrations.linkedin.base-url=http://localhost:8083
integrations.linkedin.api-key=dev-linkedin-api-key
integrations.apollo.base-url=http://localhost:8084
integrations.apollo.api-key=dev-apollo-api-key
integrations.microsoft.graph-base-url=https://graph.microsoft.com
integrations.microsoft.access-token=dev-microsoft-access-token
integrations.microsoft.oauth-base-url=https://login.microsoftonline.com/common
integrations.microsoft.client-id=dev-client-id
integrations.microsoft.client-secret=dev-client-secret
integrations.microsoft.redirect-uri=http://localhost:8080/api/auth/microsoft/callback
